name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contracts:
    name: Contracts (compile + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # CI=false: don't fail on pre-existing CRA lint warnings in legacy code
      # that is scheduled for replacement in Phase 2 (Vite migration).
      - run: CI=false npm run build
